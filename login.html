<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Astral — Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0A0A0F;
      --surface:   #13131A;
      --border:    #1E1E2E;
      --purple:    #7C5CFC;
      --purple-lt: #A78BFA;
      --text:      #E8E8F0;
      --muted:     #6B6B80;
      --white:     #FFFFFF;
      --red:       #F87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--white);
      text-decoration: none;
    }
    .logo span { color: var(--purple); }

    .back-link {
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
    }

    main::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(124,92,252,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.25rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--white);
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .card p.subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
    }

    /* Google Button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    .btn-google:hover { border-color: var(--purple-lt); }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--muted); }
    input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
    }
    .forgot-link:hover { color: var(--purple-lt); }

    .btn-primary {
      width: 100%;
      background: var(--purple);
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124,92,252,0.35);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--red);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .bottom-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--muted);
    }
    .bottom-link a {
      color: var(--purple-lt);
      text-decoration: none;
      font-weight: 500;
    }
    .bottom-link a:hover { text-decoration: underline; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.4/dist/motion.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Ast<span>r</span>al</a>
  <a href="index.html" class="back-link">← Voltar ao início</a>
</nav>

<main>
  <div class="card">
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre na sua conta para acessar seu plano de estudos.</p>

    <!-- Google -->
    <button class="btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Entrar com Google
    </button>

    <div class="divider"><span>ou</span></div>

    <!-- Erro -->
    <div class="error-msg" id="error-msg"></div>

    <!-- Form email/senha -->
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="voce@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <a href="#" class="forgot-link" onclick="esqueceuSenha(event)">Esqueci minha senha</a>

    <button class="btn-primary" id="btn-login" onclick="loginEmail()">
      Entrar →
    </button>

    <div class="bottom-link">
      Não tem conta? <a href="criar-conta.html">Criar conta grátis</a>
    </div>
  </div>
</main>

<footer>© 2026 Astral · Feito para concurseiros militares</footer>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://jjogmcacbdefwiwcyjxp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_n-PClIEGglZWhoEySjB8PA_z7KEgHfJ';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Se já estiver logado, vai pro dashboard
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = 'dashboard.html';

  function mostrarErro(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function esconderErro() {
    document.getElementById('error-msg').style.display = 'none';
  }

  window.loginGoogle = async function() {
    esconderErro();
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    });
    if (error) mostrarErro('Erro ao entrar com Google. Tente novamente.');
  }

  window.loginEmail = async function() {
    esconderErro();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btn-login');

    if (!email || !email.includes('@')) { mostrarErro('Informe um e-mail válido.'); return; }
    if (!senha) { mostrarErro('Informe sua senha.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Entrando...';

    const { error } = await supabase.auth.signInWithPassword({ email, password: senha });

    if (error) {
      if (error.message.includes('Invalid login')) {
        mostrarErro('E-mail ou senha incorretos. Tente novamente.');
      } else if (error.message.includes('Email not confirmed')) {
        mostrarErro('Confirme seu e-mail antes de entrar. Verifique sua caixa de entrada.');
      } else {
        mostrarErro('Erro ao entrar. Tente novamente.');
      }
      btn.disabled = false;
      btn.innerHTML = 'Entrar →';
      return;
    }

    window.location.href = 'dashboard.html';
  }

  window.esqueceuSenha = async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email || !email.includes('@')) {
      mostrarErro('Digite seu e-mail acima primeiro, depois clique em "Esqueci minha senha".');
      return;
    }
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if (!error) {
      esconderErro();
      alert('E-mail de redefinição enviado! Verifique sua caixa de entrada.');
    } else {
      mostrarErro('Erro ao enviar e-mail. Tente novamente.');
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') window.loginEmail();
  });
</script>
<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const { animate, stagger } = window.Motion;

  // ── CARD: fade + translateY ──
  const card = document.querySelector('main .card');
  if (card) {
    card.style.opacity = '0'; card.style.transform = 'translateY(24px)';
    animate(card, { opacity: [0, 1], transform: ['translateY(24px)', 'translateY(0)'] }, { duration: 0.5, easing: 'ease-out', delay: 0.05 });
  }

  // ── FORM FIELDS: stagger ──
  const formGroups = document.querySelectorAll('.card .form-group');
  formGroups.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(12px)'; });
  if (formGroups.length) {
    animate(formGroups, { opacity: [0, 1], transform: ['translateY(12px)', 'translateY(0)'] }, { duration: 0.4, easing: 'ease-out', delay: stagger(0.06, { start: 0.3 }) });
  }

  // ── PRIMARY BUTTON: fade in last ──
  const btn = document.querySelector('.btn-primary');
  if (btn) {
    btn.style.opacity = '0';
    animate(btn, { opacity: [0, 1] }, { duration: 0.4, easing: 'ease-out', delay: 0.55 });
  }
})();
</script>

</body>
</html>
