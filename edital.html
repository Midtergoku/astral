<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Astral — Meu Edital</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0A0A0F;
      --surface:   #13131A;
      --surface2:  #1A1A24;
      --border:    #1E1E2E;
      --purple:    #7C5CFC;
      --purple-lt: #A78BFA;
      --purple-dim:#2D1F6E;
      --gold:      #F5C542;
      --green:     #34D399;
      --red:       #F87171;
      --text:      #E8E8F0;
      --muted:     #6B6B80;
      --white:     #FFFFFF;
      --sidebar-w: 240px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      border-top: 2px solid var(--purple);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      position: fixed;
      top: 0; left: 0;
      z-index: 50;
    }

    .sidebar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--white);
      text-decoration: none;
      display: block;
      margin-bottom: 2rem;
      padding: 0 0.5rem;
    }
    .sidebar-logo span { color: var(--purple); }

    .nav-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0.5rem;
      margin-bottom: 0.4rem;
    }

    .nav-links { display: flex; flex-direction: column; gap: 0.2rem; margin-bottom: 1.5rem; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-link:hover { background: var(--surface2); color: var(--text); }
    .nav-link.active { background: rgba(124,92,252,0.12); color: var(--purple-lt); }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-bottom { margin-top: auto; }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.65rem 0.75rem;
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: color 0.15s;
    }
    .btn-logout:hover { color: var(--red); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 2rem 2.5rem;
      max-width: calc(100vw - var(--sidebar-w));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--white);
      letter-spacing: -0.02em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--purple);
      color: #fff;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-upload:hover { opacity: 0.87; transform: translateY(-1px); }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    /* ── UPLOAD SECTION ── */
    .upload-card {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 3.5rem 2rem;
      text-align: center;
      transition: border-color 0.2s;
      cursor: pointer;
      background: var(--surface);
      margin-top: 1rem;
    }
    .upload-card:hover { border-color: var(--purple); }
    .upload-card.drag-over { border-color: var(--purple); background: rgba(124,92,252,0.04); }

    .upload-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(124,92,252,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .upload-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .upload-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; max-width: 400px; margin-left: auto; margin-right: auto; }

    /* ── AI PROCESSING ── */
    .ai-processing {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 3.5rem 2rem;
      margin-top: 1rem;
    }

    .ai-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(124,92,252,0.12);
      border: 2px solid rgba(124,92,252,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124,92,252,0.3); }
      50% { box-shadow: 0 0 0 12px rgba(124,92,252,0); }
    }

    .ai-processing h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.4rem;
    }

    .ai-processing p { color: var(--muted); font-size: 0.88rem; }

    /* ── DETALHES DO EDITAL ── */
    .info-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .info-value { font-size: 1.1rem; color: var(--white); font-weight: 600; }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--white);
      margin-bottom: 1rem;
    }

    /* ── MATÉRIAS E PESOS ── */
    .materia-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .materia-row {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: var(--surface2);
      padding: 1.25rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .materia-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .materia-nome { font-size: 0.95rem; font-weight: 600; color: var(--white); margin-bottom: 0.2rem; }
    .materia-questoes { font-size: 0.75rem; color: var(--muted); }
    .materia-peso { font-size: 0.95rem; font-weight: 700; color: var(--purple-lt); }

    .peso-bar { background: var(--border); border-radius: 999px; height: 6px; overflow: hidden; margin-top: 0.25rem; }
    .peso-fill { height: 100%; border-radius: 999px; background: var(--purple-lt); }

    .btn-danger {
      background: rgba(248,113,113,0.1);
      color: var(--red);
      border: 1px solid rgba(248,113,113,0.25);
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 1.5rem;
    }
    .btn-danger:hover {
      background: rgba(248,113,113,0.2);
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; padding: 1.25rem; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>

<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">

  <div id="content-area">
    <!-- Conteúdo renderizado dinamicamente -->

  <input type="file" id="file-input" accept=".pdf" style="display:none" onchange="processarEdital(event)" />

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://jjogmcacbdefwiwcyjxp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_n-PClIEGglZWhoEySjB8PA_z7KEgHfJ';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let estado = {
    usuario: null,
    xp: 0,
    streak: 0,
    horas: 0,
    materias: [],
    cronogramaHoje: [],
    edital: null,
    badges: [],
  };

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    estado.usuario = session.user;

    // Busca dados salvos
    const dadosSalvos = localStorage.getItem(`astral_dados_${session.user.id}`);
    if (dadosSalvos) {
      const dados = JSON.parse(dadosSalvos);
      estado.xp             = dados.xp             || 0;
      estado.streak         = dados.streak         || 0;
      estado.horas          = dados.horas          || 0;
      estado.materias       = dados.materias       || [];
      estado.cronogramaHoje = dados.cronogramaHoje || [];
      estado.edital         = dados.edital         || null;
      estado.badges         = dados.badges         || [];
    }

    renderUI();
  }

  function detectarTipoConcurso(nomeEdital) {
    if (!nomeEdital) return 'Desconhecido';
    const nome = nomeEdital.toLowerCase();
    if (nome.includes('bomb') || nome.includes('cbm') || nome.includes('cbmerj') || nome.includes('bombeiro')) return 'Bombeiros';
    if (nome.includes('marinha') || nome.includes('naval') || nome.includes('en ') || nome.includes('eamcn')) return 'Marinha';
    if (nome.includes('aeronáutica') || nome.includes('aeronautica') || nome.includes('afa') || nome.includes('eear') || nome.includes('epcar')) return 'Aeronáutica';
    if (nome.includes('exército') || nome.includes('exercito') || nome.includes('espcex') || nome.includes('essa') || nome.includes('aman')) return 'Exército';
    if (nome.includes('policia militar') || nome.includes('polícia militar') || nome.includes(' pm ') || nome.includes('pmes') || nome.includes('pmrj') || nome.includes('pmsp')) return 'Polícia Militar';
    return 'Geral';
  }

  window.renderUI = function() {
    const topbarActions = document.getElementById('topbar-actions');
    const contentArea = document.getElementById('content-area');

    if (!estado.edital) {
      topbarActions.innerHTML = '';
      contentArea.innerHTML = `
        <div class="card upload-card" id="upload-area"
             ondragover="dragOver(event)"
             ondragleave="dragLeave(event)"
             ondrop="dropFile(event)"
             onclick="document.getElementById('file-input').click()">
          <div class="upload-icon">
            <svg width="24" height="24" fill="none" stroke="var(--purple-lt)" viewBox="0 0 24 24" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <h3>Seu edital. Seu plano. Em 30 segundos.</h3>
          <p>Cole o PDF do edital aqui. O Astral extrai as matérias, calcula os pesos e monta um cronograma personalizado para você.</p>
          <button class="btn-upload" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Analisar edital
          </button>
        </div>

        <div class="card ai-processing" id="ai-processing">
          <div class="ai-icon">🤖</div>
          <h3>Lendo seu edital.</h3>
          <p>Extraindo matérias, calculando pesos e montando seu cronograma. Isso leva alguns segundos.</p>
        </div>
      `;
      return;
    }

    // Se tem edital, mostra os dados
    topbarActions.innerHTML = `
      <button class="btn-upload" onclick="document.getElementById('file-input').click()">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Trocar edital
      </button>
    `;

    const matOrdenadas = [...estado.materias].sort((a, b) => b.peso - a.peso);
    const maxPeso = Math.max(...matOrdenadas.map(m => m.peso));
    const tipo = detectarTipoConcurso(estado.edital.nome);

    contentArea.innerHTML = `
      <!-- Upload Oculto mas presente para re-uso -->
      <div id="ai-processing" class="card ai-processing">
        <div class="ai-icon">🤖</div>
        <h3>Lendo seu edital.</h3>
        <p>Extraindo matérias, calculando pesos e montando seu cronograma. Isso leva alguns segundos.</p>
      </div>

      <div id="edital-details">
        <div class="card">
          <div style="font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:1.5rem;">
            ${estado.edital.nome}
          </div>
          <div class="grid-2">
            <div>
              <div class="info-label">Data da Prova</div>
              <div class="info-value">${estado.edital.dataProva || 'Não identificada'}</div>
            </div>
            <div>
              <div class="info-label">Tipo</div>
              <div class="info-value">${tipo}</div>
            </div>
            <div>
              <div class="info-label">Matérias extraídas</div>
              <div class="info-value">${estado.edital.materias}</div>
            </div>
          </div>
        </div>

        <div class="section-title">Matérias e pesos</div>
        <div class="card">
          <div class="materia-list">
            ${matOrdenadas.map(m => {
              const width = maxPeso > 0 ? (m.peso / maxPeso) * 100 : 0;
              return `
                <div class="materia-row">
                  <div class="materia-header">
                    <div>
                      <div class="materia-nome">${m.nome}</div>
                      <div class="materia-questoes">${m.questoes} questões estimadas</div>
                    </div>
                    <div class="materia-peso">${m.peso}%</div>
                  </div>
                  <div class="peso-bar">
                    <div class="peso-fill" style="width:${width}%"></div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <button class="btn-danger" onclick="removerEdital()">
          Remover edital do sistema
        </button>
      </div>
    `;
  }

  // ── UPLOAD / PROCESSAMENTO DO EDITAL ──
  window.dragOver = function(e) {
    e.preventDefault();
    document.getElementById('upload-area')?.classList.add('drag-over');
  }

  window.dragLeave = function(e) {
    document.getElementById('upload-area')?.classList.remove('drag-over');
  }

  window.dropFile = function(e) {
    e.preventDefault();
    document.getElementById('upload-area')?.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') processarEdital(null, file);
  }

  window.processarEdital = async function(event, fileOverride) {
    const file = fileOverride || event?.target?.files?.[0];
    if (!file) return;

    // Mostra processing
    const uploadArea = document.getElementById('upload-area');
    const editalDetails = document.getElementById('edital-details');
    const topbarActions = document.getElementById('topbar-actions');
    
    if (uploadArea) uploadArea.style.display = 'none';
    if (editalDetails) editalDetails.style.display = 'none';
    if (topbarActions) topbarActions.style.display = 'none';
    
    const proc = document.getElementById('ai-processing');
    if (proc) proc.style.display = 'flex';

    try {
      const base64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });

      const response = await fetch('https://jjogmcacbdefwiwcyjxp.supabase.co/functions/v1/processar-edital', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer sb_publishable_n-PClIEGglZWhoEySjB8PA_z7KEgHfJ`,
        },
        body: JSON.stringify({ pdfBase64: base64 })
      });

      const data = await response.json();
      const texto = data.data ? JSON.stringify(data.data) : '';

      let resultado;
      try {
        const limpo = texto.replace(/```json|```/g, '').trim();
        resultado = JSON.parse(limpo);
      } catch(e) {
        throw new Error('A inteligência artificial não conseguiu processar o edital corretamente. Tente um edital mais claro.');
      }

      estado.edital = {
        nome: resultado.concurso || file.name,
        materias: resultado.materias?.length || 0,
        dataProva: resultado.dataProva || null,
      };

      estado.materias = (resultado.materias || []).map(m => ({
        nome: m.nome,
        questoes: m.questoes,
        peso: m.peso,
        progresso: 0,
      }));

      estado.cronogramaHoje = estado.materias.slice(0, 3).map(m => ({
        materia: m.nome,
        tempo: Math.max(30, Math.round(m.peso * 2)),
        xp: Math.round(m.peso * 5),
        feito: false,
      }));

      if (!estado.badges.includes('primeiro_edital')) {
        estado.badges.push('primeiro_edital');
        estado.xp += 100;
      }

      salvarDados();
      // Redireciona para dashboard
      window.location.href = 'dashboard.html';

    } catch(err) {
      console.error(err);
      alert(err.message || 'Erro ao processar o edital. Tente novamente.');
      if (proc) proc.style.display = 'none';
      if (uploadArea) uploadArea.style.display = 'block';
      if (editalDetails) editalDetails.style.display = 'block';
      if (topbarActions) topbarActions.style.display = 'flex';
      renderUI();
    }
  }

  window.removerEdital = function() {
    if (confirm('Tem certeza que deseja remover o edital atual? Isso resetará as matérias e o cronograma. Suas conquistas e XP serão mantidos.')) {
      estado.edital = null;
      estado.materias = [];
      estado.cronogramaHoje = [];
      salvarDados();
      renderUI();
    }
  }

  function salvarDados() {
    const key = `astral_dados_${estado.usuario.id}`;
    localStorage.setItem(key, JSON.stringify({
      xp:             estado.xp,
      streak:         estado.streak,
      horas:          estado.horas,
      materias:       estado.materias,
      cronogramaHoje: estado.cronogramaHoje,
      edital:         estado.edital,
      badges:         estado.badges,
    }));
  }

  // ── LOGOUT ──
  window.fazerLogout = async function() {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  }

  // ── START ──
  init();
</script>

<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const { animate } = window.Motion;
  
  // Sidebar animation
  const sidebar = document.querySelector('.sidebar');
  if (sidebar) {
    sidebar.style.opacity = '0'; sidebar.style.transform = 'translateX(-20px)';
    animate(sidebar, { opacity: [0, 1], transform: ['translateX(-20px)', 'translateX(0)'] }, { duration: 0.45, easing: 'ease-out' });
  }

  // Topbar animation
  const topbar = document.querySelector('.topbar');
  if (topbar) {
    topbar.style.opacity = '0';
    animate(topbar, { opacity: [0, 1] }, { duration: 0.4, delay: 0.1 });
  }
})();
</script>

</body>
</html>
